services:
  app:
    build: .
    command: npm run dev
    ports:
      - "3000:3000"
    env_file: .env.example
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - .:/app
      - /app/node_modules
  worker:
    build: .
    command: npm run worker
    env_file: .env.example
    depends_on:
      - redis
      - postgres
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atlas
      MINIO_ROOT_PASSWORD: atlas-secret
    ports:
      - "9000:9000"
      - "9001:9001"
