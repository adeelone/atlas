name: Bug report
description: Report something that is broken
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / environment
      placeholder: "Chrome 125, Windows 11"
  - type: textarea
    id: extra
    attributes:
      label: Extra details
      description: Add logs, screenshots, or links if useful.
